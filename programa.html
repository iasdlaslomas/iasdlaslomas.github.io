<head>
<meta charset="UTF-8">

<title>Programa del sábado — IASD Las Lomas</title>

<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@1,500;1,600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="tokens.css">
<style>
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body { margin: 0; background: var(--bg); color: var(--ink); font-family: var(--font-body); line-height: var(--leading-normal); }
  .wrap { max-width: 880px; margin: 0 auto; padding: 0 var(--space-6); }
  section { padding: clamp(2.5rem, 6vh, 4rem) 0; }

  header { position: sticky; top: 0; z-index: 20; background: color-mix(in srgb, var(--color-crema-100) 90%, transparent); backdrop-filter: blur(10px); border-bottom: var(--line-thin) solid var(--border); }
  .nav { display: flex; align-items: center; gap: var(--space-5); padding: var(--space-3) 0; max-width: 1120px; margin: 0 auto; padding-left: var(--space-6); padding-right: var(--space-6); }
  .brand { display: flex; align-items: center; gap: var(--space-3); text-decoration: none; color: var(--ink); }
  .brand svg { width: 40px; height: auto; stroke: var(--accent-press); }
  .brand .name { font-weight: 700; letter-spacing: var(--tracking-wider); font-size: var(--text-sm); text-transform: uppercase; }
  .brand .desc { display: block; font-family: var(--font-script); font-style: italic; font-size: var(--text-xs); letter-spacing: 0; text-transform: none; color: var(--ink-muted); }
  .nav nav { margin-left: auto; display: flex; gap: var(--space-5); align-items: center; }
  .nav nav a { color: var(--ink-soft); text-decoration: none; font-size: var(--text-sm); font-weight: 600; }
  .nav nav a:hover, .nav nav a.actual { color: var(--accent-press); }
  .nav-toggle { display: none; margin-left: auto; background: transparent; border: none; cursor: pointer; padding: 6px; color: var(--ink); }
  .nav-toggle svg { width: 24px; height: 24px; display: block; }
  @media (max-width: 820px) {
    .nav-toggle { display: block; }
    .nav nav { display: none; position: absolute; top: 100%; left: 0; right: 0; margin: 0; flex-direction: column; align-items: flex-start; gap: 0; background: color-mix(in srgb, var(--color-crema-100) 97%, transparent); backdrop-filter: blur(10px); border-bottom: var(--line-thin) solid var(--border); padding: var(--space-2) var(--space-6) var(--space-4); box-shadow: var(--shadow-md); }
    .nav nav.abierto { display: flex; }
    .nav nav a { padding: 10px 0; font-size: var(--text-base); width: 100%; }
  }

  .hero-mini { background: var(--bg-inverted); color: var(--ink-on-dark); padding: clamp(2.5rem, 6vh, 4rem) 0; }
  .hero-mini .kicker { color: var(--color-cielo-300); }
  .hero-mini h1 { font-size: clamp(2.2rem, 5vw, 3.2rem); margin: var(--space-2) 0 0; letter-spacing: var(--tracking-tight); line-height: var(--leading-tight); }
  .kicker { font-size: var(--text-xs); letter-spacing: var(--tracking-wider); text-transform: uppercase; font-weight: 700; color: var(--accent-press); }
  .loma { display: block; width: 100%; height: 48px; }

  .vacio { color: var(--ink-muted); font-size: var(--text-base); background: var(--bg-elevated); border: var(--line-thin) dashed var(--border-strong); border-radius: var(--radius-lg); padding: var(--space-6); text-align: center; }

  h2.titulo { font-size: var(--text-2xl); font-weight: 600; letter-spacing: var(--tracking-tight); margin: 0 0 var(--space-5); }
  .schedule { background: var(--bg-elevated); border: var(--line-thin) solid var(--border); border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow-md); }
  .schedule .head { background: var(--bg-inverted); color: var(--ink-on-dark); padding: var(--space-4) var(--space-5); }
  .schedule .head .day { font-size: var(--text-xs); letter-spacing: var(--tracking-wider); text-transform: uppercase; color: var(--color-cielo-300); }
  .schedule .head .title { font-size: var(--text-xl); font-weight: 600; margin-top: 2px; }
  .slot { display: flex; align-items: center; gap: var(--space-4); padding: var(--space-4) var(--space-5); border-bottom: var(--line-thin) solid var(--border); }
  .slot:last-child { border-bottom: none; }
  .slot .time { font-weight: 600; font-size: var(--text-base); color: var(--accent-press); width: 92px; flex: none; font-variant-numeric: tabular-nums; }
  .slot .what b { display: block; font-size: var(--text-base); font-weight: 600; }
  .slot .what span { font-size: var(--text-sm); color: var(--ink-muted); }
  .slot .what .det { display: block; font-size: var(--text-xs); color: var(--ink-muted); margin-top: 2px; font-style: italic; }
  .slot .what .rec { display: block; font-size: var(--text-xs); color: var(--accent-press); margin-top: 2px; font-weight: 600; }
  .slot .what a.abrir { display: inline-block; font-size: var(--text-xs); font-weight: 700; letter-spacing: var(--tracking-wide); color: var(--accent-press); text-decoration: none; border: var(--line-thin) solid var(--border-strong); border-radius: var(--radius-pill); padding: 3px 12px; margin-top: 6px; margin-right: 6px; }
  .slot .what a.abrir:hover { background: var(--bg-tinted); }
  .schedule + .schedule { margin-top: var(--space-5); }
  .schedule .head .tema { font-family: var(--font-script); font-style: italic; font-size: var(--text-base); color: var(--color-cielo-300); margin-top: 2px; }
  .schedule .head .ver-diseno { display: inline-block; margin-top: var(--space-2); font-size: var(--text-xs); font-weight: 700; letter-spacing: var(--tracking-wide); color: var(--color-cielo-300); text-decoration: none; border: var(--line-thin) solid var(--color-carbon-600); border-radius: var(--radius-pill); padding: 5px 14px; }
  .schedule .head .ver-diseno:hover { color: var(--ink-on-dark); border-color: var(--color-cielo-300); }
  .schedule .pie { padding: var(--space-3) var(--space-5); background: var(--bg-tinted); font-size: var(--text-sm); color: var(--ink-soft); border-top: var(--line-thin) solid var(--border); }
  .nota-prep { display: flex; gap: var(--space-3); align-items: start; background: var(--bg-tinted); border: var(--line-thin) solid var(--border-strong); border-radius: var(--radius-lg); padding: var(--space-4) var(--space-5); margin-bottom: var(--space-5); font-size: var(--text-sm); color: var(--accent-press); }

  footer { background: var(--bg-inverted); color: var(--ink-on-dark); padding: var(--space-6) 0; margin-top: var(--space-8); }
  footer .wrap { display: flex; flex-wrap: wrap; gap: var(--space-5); align-items: center; justify-content: space-between; max-width: 1120px; }
  footer small { color: var(--color-gris-400); font-size: var(--text-xs); }
  footer a { color: var(--color-cielo-300); text-decoration: none; font-size: var(--text-sm); font-weight: 600; }
</style>
</head>
<body>

<header>
  <div class="nav">
    <a class="brand" href="index.html">
      <svg viewBox="0 0 160 120" fill="none" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M14,102 Q80,88 146,102"/><path d="M36,22 L54,16 L54,94 L36,94 Z"/><line x1="54" y1="12" x2="54" y2="94"/><line x1="42" y1="48" x2="98" y2="48"/><path d="M62,48 L110,48 L110,94 L62,94 Z"/><line x1="110" y1="48" x2="74" y2="94"/>
      </svg>
      <span>
        <span class="name">Las Lomas</span>
        <span class="desc">Iglesia Adventista del Séptimo Día</span>
      </span>
    </a>
    <button class="nav-toggle" type="button" aria-label="Abrir menú" aria-expanded="false">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="4" y1="7" x2="20" y2="7"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="17" x2="20" y2="17"/></svg>
    </button>
    <nav>
      <a href="index.html">Inicio</a>
      <a href="anuncios.html">Anuncios</a>
      <a href="programa.html" class="actual">Programa</a>
      <a href="calendario.html">Calendario</a>
      <a href="ministerios.html">Ministerios</a>
      <a href="redes.html">Redes</a>
      <a href="index.html#contacto">Contacto</a>
    </nav>
  </div>
</header>

<div class="hero-mini">
  <div class="wrap">
    <h1>Programa del sábado</h1>
  </div>
</div>
<svg class="loma" viewBox="0 0 1440 48" preserveAspectRatio="none" aria-hidden="true">
  <path d="M0,48 L0,40 Q720,-22 1440,40 L1440,48 Z" fill="var(--color-carbon-800)" transform="scale(1,-1) translate(0,-48)"/>
</svg>

<section id="programa">
  <div class="wrap">
    <div id="programa-bloques"></div>
    <div class="schedule" id="programa-card" hidden>
      <div class="head">
        <div class="day" id="programa-fecha">Este sábado</div>
        <div class="title">Encargados del programa</div>
      </div>
      <div id="programa-lista"></div>
    </div>
    <p class="vacio" id="programa-vacio" hidden>El programa de este sábado aún no se publica.</p>
  </div>
</section>

<footer>
  <div class="wrap">
    <a href="index.html">← Volver al inicio</a>
    <small>© 2026 IASD Las Lomas · iasdlaslomas.com</small>
  </div>
</footer>

<script>
(function () {
  fetch('programa.json', { cache: 'no-store' })
    .then(function (r) { if (!r.ok) throw 0; return r.json(); })
    .then(function (p) {
      if (!p) throw 0;
      if (p.fecha && new Date(p.fecha + 'T23:59:59') < new Date()) throw 0;

      function fechaLarga() {
        if (!p.fecha) return 'Este sábado';
        var f = new Date(p.fecha + 'T12:00:00');
        return 'Sábado ' + f.toLocaleDateString('es-MX', { day: 'numeric', month: 'long' });
      }
      function textoRecursos(r) {
        var t = [];
        if (r.microfonosVoz) t.push(r.microfonosVoz + (r.microfonosVoz === 1 ? ' micrófono de voz' : ' micrófonos de voz'));
        if (r.microfonosInstrumento) t.push(r.microfonosInstrumento + (r.microfonosInstrumento === 1 ? ' micrófono de instrumento' : ' micrófonos de instrumento'));
        if (r.otros) t.push(r.otros);
        return t.join(' · ');
      }

      // Enlaces a fuentes oficiales (no copiamos letras ni texto bíblico: derechos de autor).
      function chipAbrir(url, texto) {
        var a = document.createElement('a');
        a.className = 'abrir';
        a.href = url; a.target = '_blank'; a.rel = 'noopener';
        a.textContent = texto;
        return a;
      }
      function urlHimno(texto) {
        var m = /himno\s*#?\s*(\d+)/i.exec(texto || '');
        return m ? 'https://www.nuevohimnario.com/Himno?no=' + m[1] : null;
      }
      var LIBROS = {'genesis':'GEN','exodo':'EXO','levitico':'LEV','numeros':'NUM','deuteronomio':'DEU','josue':'JOS','jueces':'JDG','rut':'RUT','1 samuel':'1SA','2 samuel':'2SA','1 reyes':'1KI','2 reyes':'2KI','1 cronicas':'1CH','2 cronicas':'2CH','esdras':'EZR','nehemias':'NEH','ester':'EST','job':'JOB','salmo':'PSA','salmos':'PSA','proverbios':'PRO','eclesiastes':'ECC','cantares':'SNG','isaias':'ISA','jeremias':'JER','lamentaciones':'LAM','ezequiel':'EZK','daniel':'DAN','oseas':'HOS','joel':'JOL','amos':'AMO','abdias':'OBA','jonas':'JON','miqueas':'MIC','nahum':'NAM','habacuc':'HAB','sofonias':'ZEP','hageo':'HAG','zacarias':'ZEC','malaquias':'MAL','mateo':'MAT','marcos':'MRK','lucas':'LUK','juan':'JHN','hechos':'ACT','romanos':'ROM','1 corintios':'1CO','2 corintios':'2CO','galatas':'GAL','efesios':'EPH','filipenses':'PHP','colosenses':'COL','1 tesalonicenses':'1TH','2 tesalonicenses':'2TH','1 timoteo':'1TI','2 timoteo':'2TI','tito':'TIT','filemon':'PHM','hebreos':'HEB','santiago':'JAS','1 pedro':'1PE','2 pedro':'2PE','1 juan':'1JN','2 juan':'2JN','3 juan':'3JN','judas':'JUD','apocalipsis':'REV'};
      function sinAcentos(s) { return s.normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase(); }
      function urlVersiculo(texto) {
        if (!texto) return null;
        var re = /((?:[123]\s+)?[A-Za-z\u00c0-\u017e]+)\s+(\d+)(?:\s*:\s*(\d+(?:\s*-\s*\d+)?)|\s*[\u2013-]\s*\d+)?/g;
        var m;
        while ((m = re.exec(texto)) !== null) {
          var libro = LIBROS[sinAcentos(m[1]).replace(/\s+/g, ' ').trim()];
          if (!libro) continue;
          var url = 'https://www.bible.com/es/bible/149/' + libro + '.' + m[2];
          if (m[3]) url += '.' + m[3].replace(/\s/g, '');
          return url + '.RVR1960';
        }
        return null;
      }

      if (p.bloques && p.bloques.length) {
        // Formato v2: una tarjeta por bloque (Escuela Sabática, Culto Divino, Culto Joven…).
        var cont = document.getElementById('programa-bloques');
        var pinto = false, hayRecursos = false;
        p.bloques.forEach(function (bl) {
          if (!bl || !bl.titulo) return;
          var partes = (bl.partes || []).filter(function (x) { return x && x.seccion; });
          if (!partes.length) return;
          pinto = true;

          var card = document.createElement('div'); card.className = 'schedule';
          var head = document.createElement('div'); head.className = 'head';
          var day = document.createElement('div'); day.className = 'day'; day.textContent = fechaLarga(); head.appendChild(day);
          var tit = document.createElement('div'); tit.className = 'title'; tit.textContent = bl.titulo; head.appendChild(tit);
          if (bl.tema) { var tm = document.createElement('div'); tm.className = 'tema'; tm.textContent = bl.tema; head.appendChild(tm); }
          if (bl.tema) {
            var uvt = urlVersiculo(bl.tema);
            if (uvt) {
              var at = chipAbrir(uvt, 'Ver pasaje ↗');
              at.className = 'ver-diseno';
              head.appendChild(at);
            }
          }
          if (bl.enlace) {
            var vd = document.createElement('a');
            vd.className = 'ver-diseno'; vd.href = bl.enlace; vd.target = '_blank'; vd.rel = 'noopener';
            vd.textContent = 'Ver programa diseñado ↗';
            head.appendChild(vd);
          }
          card.appendChild(head);

          partes.forEach(function (x) {
            var s = document.createElement('div'); s.className = 'slot';
            var t = document.createElement('div'); t.className = 'time';
            t.textContent = x.inicio ? (x.inicio + (x.fin ? '–' + x.fin : '')) : '·';
            s.appendChild(t);
            var w = document.createElement('div'); w.className = 'what';
            var b = document.createElement('b'); b.textContent = x.seccion; w.appendChild(b);
            if (x.encargado) { var sp = document.createElement('span'); sp.textContent = x.encargado; w.appendChild(sp); }
            if (x.detalle) { var d = document.createElement('span'); d.className = 'det'; d.textContent = x.detalle; w.appendChild(d); }
            var uh = urlHimno(x.seccion);
            if (uh) w.appendChild(chipAbrir(uh, 'Ver letra ↗'));
            var uv = urlVersiculo(((x.seccion || '') + ' | ' + (x.detalle || '')));
            if (uv && !uh) w.appendChild(chipAbrir(uv, 'Ver versículo ↗'));
            var rec = x.recursos ? textoRecursos(x.recursos) : (x.multimedia || '');
            if (rec) {
              hayRecursos = true;
              var m = document.createElement('span'); m.className = 'rec'; m.textContent = '🎤 Recursos: ' + rec;
              w.appendChild(m);
            }
            if (x.pista) {
              hayRecursos = true;
              var au = document.createElement('audio');
              au.controls = true; au.preload = 'none'; au.src = x.pista;
              au.style.cssText = 'display:block;margin-top:6px;width:100%;max-width:320px;height:32px;';
              w.appendChild(au);
            }
            s.appendChild(w); card.appendChild(s);
          });

          var pie = [];
          if (bl.piano) pie.push('Piano: ' + bl.piano);
          if (bl.batuta) pie.push('Batuta: ' + bl.batuta);
          if (pie.length) {
            var pd = document.createElement('div'); pd.className = 'pie'; pd.textContent = pie.join(' · ');
            card.appendChild(pd);
          }
          cont.appendChild(card);
        });
        if (!pinto) throw 0;
      } else if (p.partes && p.partes.length) {
        // Formato v1 (compatibilidad).
        var lista = document.getElementById('programa-lista');
        p.partes.forEach(function (x) {
          if (!x || !x.parte) return;
          var s = document.createElement('div'); s.className = 'slot';
          var t = document.createElement('div'); t.className = 'time'; t.textContent = x.hora || '·'; s.appendChild(t);
          var w = document.createElement('div'); w.className = 'what';
          var b = document.createElement('b'); b.textContent = x.parte; w.appendChild(b);
          if (x.encargado) { var sp = document.createElement('span'); sp.textContent = x.encargado; w.appendChild(sp); }
          s.appendChild(w); lista.appendChild(s);
        });
        document.getElementById('programa-fecha').textContent = fechaLarga();
        document.getElementById('programa-card').hidden = false;
      } else {
        throw 0;
      }
    })
    .catch(function () { document.getElementById('programa-vacio').hidden = false; });
})();
</script>
<script>
(function () {
  var t = document.querySelector('.nav-toggle'), n = document.querySelector('.nav nav');
  if (!t || !n) return;
  t.addEventListener('click', function () {
    var abierto = n.classList.toggle('abierto');
    t.setAttribute('aria-expanded', abierto ? 'true' : 'false');
  });
  n.addEventListener('click', function (e) {
    if (e.target.closest('a')) { n.classList.remove('abierto'); t.setAttribute('aria-expanded', 'false'); }
  });
})();
</script>
</body>
</html>
